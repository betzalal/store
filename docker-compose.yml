version: '3.8'

services:
  # --- TIENDA PRINCIPAL (STORE) ---
  store-db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: betzalal
      POSTGRES_PASSWORD: Justcause1967
      POSTGRES_DB: db_store
    ports:
      - "5434:5432"
    volumes:
      - store_data:/var/lib/postgresql/data

  store-backend:
    build: ./backend
    restart: always
    ports:
      - "3100:3001"
    environment:
      - DATABASE_URL=postgresql://betzalal:Justcause1967@store-db:5432/db_store
      - TRUST_PROXY=false
    depends_on:
      - store-db

  store-frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://144.91.118.73:3100
    ports:
      - "5175:5173"
    depends_on:
      - store-backend

